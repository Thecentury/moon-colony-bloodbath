<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0b1020" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Moon Colony Bloodbath — Resource Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1>Moon Colony<span>Bloodbath</span></h1>
    <button id="reset" class="reset" type="button" aria-label="Reset all resources to zero">Reset</button>
  </header>

  <main id="resources" class="resources"></main>

  <footer class="app-footer">Tap − or + on a resource to enter an amount.</footer>

  <script src="app.js"></script>
</body>
</html>
